<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הרפתקת הכפל - הגרסה הסופית</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Assistant', sans-serif;
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: background 0.8s ease;
            margin: 0;
        }
        .game-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 500px;
            padding: 2rem;
            z-index: 10;
            position: relative;
        }
        #active-pet-emoji {
            display: inline-block;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            will-change: transform;
            image-rendering: -webkit-optimize-contrast;
            line-height: 1;
        }
        .pet-container {
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 1rem;
        }

        /* --- אנימציות מעבר עוצמתיות --- */
        @keyframes mega-shake {
            0% { transform: translate(0,0) rotate(0); }
            10% { transform: translate(-20px, -20px) rotate(-5deg); }
            20% { transform: translate(20px, 20px) rotate(5deg); }
            30% { transform: translate(-30px, 10px) rotate(-10deg); }
            40% { transform: translate(30px, -10px) rotate(10deg); }
            50% { transform: translate(-20px, 20px) rotate(-5deg); background: white; }
            60% { transform: translate(20px, -20px) rotate(5deg); }
            70% { transform: translate(-30px, -10px) rotate(-10deg); background: white; }
            80% { transform: translate(30px, 10px) rotate(10deg); }
            90% { transform: translate(-10px, -10px) rotate(-2deg); }
            100% { transform: translate(0,0) rotate(0); }
        }
        .mega-shake-active { animation: mega-shake 0.1s infinite; }

        #flash-overlay {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 100;
            display: none;
            pointer-events: none;
        }
        #black-screen {
            position: fixed;
            inset: 0;
            background: black;
            z-index: 101;
            display: none;
        }

        .magic-mode-bg { animation: rainbowBg 10s infinite linear !important; }
        @keyframes rainbowBg {
            0% { background: #ff9a9e; }
            33% { background: #a1c4fd; }
            66% { background: #d4fc79; }
            100% { background: #ff9a9e; }
        }

        /* --- משוב מטבעות --- */
        .coin-feedback {
            position: absolute;
            font-weight: 900;
            font-size: 1.5rem;
            color: #d97706;
            pointer-events: none;
            animation: floatUp 1s forwards;
            z-index: 50;
        }
        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }

        progress { width: 100%; height: 8px; border-radius: 10px; }
        progress::-webkit-progress-value { background: #06b6d4; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="flash-overlay"></div>
    <div id="black-screen"></div>

    <div id="game-ui" class="w-full max-w-4xl px-4 flex flex-col items-center">
        <!-- Stats -->
        <div class="w-full flex flex-wrap justify-between items-center mb-6 gap-4">
            <div class="flex gap-2">
                <div class="bg-white px-4 py-2 rounded-full shadow-md font-bold text-yellow-600">💰 <span id="coins">0</span></div>
                <div id="diamond-bar" class="hidden bg-white px-4 py-2 rounded-full shadow-md font-bold text-cyan-500">💎 <span id="diamonds">0</span></div>
                <div class="bg-white px-4 py-2 rounded-full shadow-md font-bold text-red-500">🔥 <span id="streak">0</span></div>
            </div>
            <div class="flex gap-2">
                <button id="buy-diamond-btn" onclick="buyDiamond()" class="hidden bg-cyan-500 text-white px-4 py-2 rounded-full font-bold shadow-lg text-sm">קנה יהלום (10💰)</button>
                <button onclick="toggleShop()" class="bg-purple-600 text-white px-5 py-2 rounded-full font-bold shadow-lg text-sm">🛒 חנות</button>
            </div>
        </div>

        <!-- Main Card -->
        <div id="main-card" class="game-card text-center">
            <div id="problem-area">
                <p class="text-gray-400 font-bold mb-2">כמה זה?</p>
                <div id="problem" class="text-6xl font-black text-indigo-900 mb-8 tracking-tighter">
                    <span id="n1">?</span> × <span id="n2">?</span>
                </div>
                <div id="options" class="grid grid-cols-2 gap-4"></div>
            </div>

            <div class="pet-container">
                <div id="active-pet-emoji" style="font-size: 50px;">🐥</div>
            </div>
            <div id="pet-info" class="text-xs font-bold text-gray-400 mt-1 uppercase tracking-widest">אפרוח</div>
        </div>
    </div>

    <!-- Shop Overlay -->
    <div id="shop-overlay" class="fixed inset-0 bg-black/60 hidden z-50 p-4 items-center justify-center">
        <div class="bg-white rounded-3xl w-full max-w-md max-h-[80vh] flex flex-col">
            <div class="p-5 border-b flex justify-between items-center">
                <h2 class="font-black text-xl">חנות החיות 🐾</h2>
                <button onclick="toggleShop()" class="text-2xl font-bold">&times;</button>
            </div>
            <div id="shop-list" class="p-5 overflow-y-auto space-y-4"></div>
        </div>
    </div>

    <script>
        const petsData = [
            { id: 'chick', name: 'אפרוח', emoji: '🐥', price: 0, power: 1, diamondCost: 1 },
            { id: 'cat', name: 'חתלתול', emoji: '🐱', price: 50, power: 3, diamondCost: 2 },
            { id: 'dog', name: 'כלבלב', emoji: '🐶', price: 150, power: 8, diamondCost: 3 },
            { id: 'bunny', name: 'ארנב', emoji: '🐰', price: 400, power: 15, diamondCost: 5 },
            { id: 'unicorn', name: 'חד קרן', emoji: '🦄', price: 1000, power: 40, diamondCost: 8 },
            { id: 'dragon', name: 'דרקון', emoji: '🐲', price: 3000, power: 100, diamondCost: 15 }
        ];

        let state = {
            coins: 0, diamonds: 0, streak: 0,
            owned: ['chick'], active: 'chick', isMagic: false,
            growth: {}, feeds: {}, recipeStep: 0
        };

        let currentAns = 0;
        let isProcessing = false;

        function init() {
            const saved = localStorage.getItem('math_quest_pro');
            if (saved) {
                state = JSON.parse(saved);
                if (state.isMagic) enableMagicUI();
            }
            render();
            newProblem();
        }

        function newProblem() {
            isProcessing = false;
            let a, b;
            if (state.isMagic) {
                a = Math.floor(Math.random() * 6) + 3;
                b = Math.floor(Math.random() * 6) + 3;
            } else {
                a = Math.floor(Math.random() * 8) + 2;
                b = Math.floor(Math.random() * 8) + 2;
            }
            currentAns = a * b;
            document.getElementById('n1').innerText = a;
            document.getElementById('n2').innerText = b;

            const opts = [currentAns];
            while(opts.length < 4) {
                let off = (Math.floor(Math.random() * 5) + 1) * (Math.random() < 0.5 ? 1 : -1);
                let fake = currentAns + off;
                if(fake > 0 && !opts.includes(fake)) opts.push(fake);
            }
            opts.sort(() => Math.random() - 0.5);

            const container = document.getElementById('options');
            container.innerHTML = '';
            opts.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "answer-btn bg-indigo-50 hover:bg-indigo-100 text-indigo-900 font-black py-4 rounded-2xl text-2xl border-b-4 border-indigo-200 transition-all";
                btn.innerText = opt;
                btn.onclick = () => check(opt, btn);
                container.appendChild(btn);
            });
        }

        function check(val, btn) {
            if (isProcessing) return;
            isProcessing = true;
            
            // נעילת כל הכפתורים
            document.querySelectorAll('.answer-btn').forEach(b => b.disabled = true);

            if (val === currentAns) {
                state.streak++;
                btn.classList.replace('bg-indigo-50', 'bg-green-400');
                btn.classList.add('text-white');

                // חישוב רווחים
                const pData = petsData.find(p => p.id === state.active);
                const gLvl = state.growth[state.active] || 0;
                const petBonus = pData.power * (1 + gLvl);
                const streakBonus = Math.floor(state.streak / 5) * 10;
                const totalGained = 10 + petBonus + streakBonus;

                spawnCoinFeedback(totalGained);
                state.coins += totalGained;

                if (state.streak >= 10 && state.recipeStep === 0) state.recipeStep = 1;

                if (state.recipeStep === 3 && state.active === 'unicorn' && !state.isMagic) {
                    triggerMegaMagicEvent();
                    return;
                }
            } else {
                state.streak = 0;
                state.recipeStep = 0;
                btn.classList.replace('bg-indigo-50', 'bg-red-400');
                btn.classList.add('text-white');
            }

            save();
            render();
            setTimeout(newProblem, 800);
        }

        function spawnCoinFeedback(amount) {
            const fb = document.createElement('div');
            fb.className = 'coin-feedback';
            fb.innerText = `+${amount}💰`;
            fb.style.left = '50%';
            fb.style.top = '20%';
            document.getElementById('main-card').appendChild(fb);
            setTimeout(() => fb.remove(), 1000);
        }

        function triggerMegaMagicEvent() {
            const body = document.body;
            const flash = document.getElementById('flash-overlay');
            const black = document.getElementById('black-screen');
            
            // שלב 1: רעידות בטירוף ואורות
            body.classList.add('mega-shake-active');
            let flashInterval = setInterval(() => {
                flash.style.display = flash.style.display === 'none' ? 'block' : 'none';
            }, 50);

            setTimeout(() => {
                // שלב 2: מסך שחור
                clearInterval(flashInterval);
                flash.style.display = 'none';
                black.style.display = 'block';

                setTimeout(() => {
                    // שלב 3: חזרה עם הקשת ורעידות
                    black.style.display = 'none';
                    state.isMagic = true;
                    state.recipeStep = 0;
                    enableMagicUI();
                    save();
                    render();
                    
                    // רעידות חזרה לעוד רגע
                    setTimeout(() => {
                        body.classList.remove('mega-shake-active');
                        newProblem();
                    }, 2000);
                }, 2500);
            }, 4000);
        }

        function enableMagicUI() {
            document.body.classList.add('magic-mode-bg');
            document.getElementById('diamond-bar').classList.remove('hidden');
            document.getElementById('buy-diamond-btn').classList.remove('hidden');
        }

        function buyDiamond() {
            if (state.coins >= 10) {
                state.coins -= 10;
                state.diamonds++;
                save(); render();
            }
        }

        function toggleShop() {
            const el = document.getElementById('shop-overlay');
            el.classList.toggle('hidden'); el.classList.toggle('flex');
            if (!el.classList.contains('hidden')) renderShop();
        }

        function renderShop() {
            const list = document.getElementById('shop-list');
            list.innerHTML = '';
            petsData.forEach(p => {
                const isOwned = state.owned.includes(p.id);
                const isActive = state.active === p.id;
                const gLvl = state.growth[p.id] || 0;
                const feeds = state.feeds[p.id] || 0;
                const item = document.createElement('div');
                item.className = `p-4 rounded-2xl border-2 ${isActive ? 'border-purple-500 bg-purple-50' : 'border-gray-100 bg-white'}`;
                let html = `
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <span class="text-3xl">${p.emoji}</span>
                            <div><div class="font-bold">${p.name} ${gLvl > 0 ? `(רמה ${gLvl})` : ''}</div>
                            <div class="text-[10px] text-gray-500">בונוס: +${p.power * (1+gLvl)} 💰</div></div>
                        </div>
                        <button onclick="${isOwned ? `selectPet('${p.id}')` : `buyPet('${p.id}', ${p.price})`}" 
                                class="px-4 py-1 rounded-full font-bold text-xs ${isActive ? 'bg-purple-500 text-white' : 'bg-gray-200'}">
                            ${isOwned ? (isActive ? 'פעיל' : 'בחר') : p.price + ' 💰'}
                        </button>
                    </div>
                `;
                if (state.isMagic && isOwned) {
                    html += `<div class="mt-3 pt-3 border-t border-dashed">
                        <div class="flex justify-between text-[10px] mb-1 font-bold"><span>התקדמות לרמה ${gLvl + 1}:</span><span>${feeds}/10</span></div>
                        <progress value="${feeds}" max="10"></progress>
                        <button onclick="feedPet('${p.id}')" ${gLvl >= 10 ? 'disabled' : ''} class="w-full mt-2 bg-cyan-500 text-white text-xs py-1.5 rounded-lg font-bold">
                            ${gLvl >= 10 ? 'רמה מקסימלית' : `האכל ב-${p.diamondCost} 💎`}
                        </button></div>`;
                }
                item.innerHTML = html;
                list.appendChild(item);
            });
        }

        function buyPet(id, price) {
            if (state.coins >= price) { state.coins -= price; state.owned.push(id); save(); render(); renderShop(); }
        }

        function selectPet(id) {
            state.active = id;
            if (state.streak >= 10) {
                if (id === 'chick' && state.recipeStep === 1) state.recipeStep = 2;
                else if (id === 'unicorn' && state.recipeStep === 2) state.recipeStep = 3;
                else if (id !== 'chick' && id !== 'unicorn') state.recipeStep = 1;
            } else { state.recipeStep = 0; }
            save(); render(); renderShop();
        }

        function feedPet(id) {
            const p = petsData.find(x => x.id === id);
            if (state.diamonds >= p.diamondCost) {
                state.diamonds -= p.diamondCost;
                state.feeds[id] = (state.feeds[id] || 0) + 1;
                if (state.feeds[id] >= 10) { state.feeds[id] = 0; state.growth[id] = (state.growth[id] || 0) + 1; }
                save(); render(); renderShop();
            }
        }

        function render() {
            document.getElementById('coins').innerText = Math.floor(state.coins);
            document.getElementById('diamonds').innerText = state.diamonds;
            document.getElementById('streak').innerText = state.streak;
            const p = petsData.find(x => x.id === state.active);
            const gLvl = state.growth[state.active] || 0;
            const emojiEl = document.getElementById('active-pet-emoji');
            emojiEl.innerText = p.emoji;
            document.getElementById('pet-info').innerText = `${p.name} | רמה ${gLvl}`;
            const scale = 1 + (gLvl * 0.15);
            emojiEl.style.transform = `scale(${scale})`;
        }

        function save() { localStorage.setItem('math_quest_pro', JSON.stringify(state)); }

        init();
    </script>
</body>
</html>
